enabled: false
provider: dashscope
model: qwen3.7-plus
base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
api_key_env: DASHSCOPE_API_KEY
base_url_env: DASHSCOPE_BASE_URL
env_file: .env
mode: direct_vlm
temperature: 0
max_output_tokens: 2048
max_frames: 8
max_pixels: 1048576
timeout_seconds: 120
max_retries: 2
parse_retries: 1
